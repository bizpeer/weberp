# Firebase 및 GitHub Pages 통합 배포 워크플로우
name: Deploy to Firebase and GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 단일 배포를 위해 동시성 제한
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies (Functions)
        run: |
          cd functions
          npm ci

      - name: Install dependencies (Client)
        run: |
          cd client
          npm ci

      - name: Build (Client)
        run: |
          cd client
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
          CI: true

      # Node.js 설정 (v20 LTS로 고정하여 GCF 런타임 일치)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. Google 공식 인증 액션을 통한 서비스 계정 로드
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HR_SPENDING }}

      # 2. 인증 상태 사전 검증 (공식 인증 경로 확인)
      - name: Verify Firebase Auth Status
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools projects:list --non-interactive
          npx firebase-tools --version
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      # 3. Firebase Cloud Functions 배포 (디버그 모드 활성화)
      - name: Deploy to Firebase (Functions Only)
        run: npx firebase-tools deploy --only functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive --debug

      # 4. Firebase Hosting 및 규칙 배포
      - name: Deploy to Firebase (Hosting & Rules)
        run: npx firebase-tools deploy --only hosting,firestore:rules,storage:rules --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive --debug

      # 클린업
      - name: Cleanup Auth File
        run: rm -f .firebase/service-account.json
        if: always()

      # GitHub Pages 배포 전 아티팩트 업로드
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

  # GitHub Pages 배포 작업
  deploy_pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
