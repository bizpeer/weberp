# Firebase 및 GitHub Pages 통합 배포 워크플로우
name: Deploy to Firebase and GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 단일 배포를 위해 동시성 제한
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies (Client)
        run: |
          cd client
          npm ci

      - name: Build (Client)
        run: |
          cd client
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
          CI: true




      # Firebase Hosting 배포
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HR_SPENDING }}'
          channelId: live
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          firebaseToolsVersion: latest

      # Firestore & Storage Rules 배포 (서비스 계정 권한 활용)
      - name: Deploy Firebase Rules (Firestore & Storage)
        run: |
          mkdir -p .firebase
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HR_SPENDING }}' > .firebase/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=.firebase/service-account.json
          npx firebase-tools deploy --only firestore:rules,storage:rules --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          rm .firebase/service-account.json
        continue-on-error: true # 룰 배포 실패가 전체 빌드를 멈추지 않도록 함

      # GitHub Pages 배포 전 아티팩트 업로드
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

  # GitHub Pages 배포 작업
  deploy_pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
