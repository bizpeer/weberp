# Firebase 및 GitHub Pages 통합 배포 워크플로우
name: Deploy to Firebase and GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 단일 배포를 위해 동시성 제한
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies (Functions)
        run: |
          cd functions
          npm ci

      - name: Install dependencies (Client)
        run: |
          cd client
          npm ci

      - name: Build (Client)
        run: |
          cd client
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
          CI: true

      # 1. Firebase Hosting 및 보안 규칙 배포
      - name: Deploy to Firebase (Hosting & Rules)
        run: |
          mkdir -p .firebase
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HR_SPENDING }}' > .firebase/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=.firebase/service-account.json
          npx firebase-tools deploy --only hosting,firestore:rules,storage:rules --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive
          rm .firebase/service-account.json

      # 2. Firebase Cloud Functions 배포 (별도 분리하여 실패 지점 확인)
      - name: Deploy to Firebase (Functions)
        run: |
          mkdir -p .firebase
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HR_SPENDING }}' > .firebase/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=.firebase/service-account.json
          # 함수 배포는 API 활성화 및 권한이 필수적입니다. 실패 시 로그를 반드시 확인해야 합니다.
          npx firebase-tools deploy --only functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive
          rm .firebase/service-account.json

      # GitHub Pages 배포 전 아티팩트 업로드
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

  # GitHub Pages 배포 작업
  deploy_pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
