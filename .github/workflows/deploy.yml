# Firebase 및 GitHub Pages 통합 배포 워크플로우
name: Deploy to Firebase and GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 단일 배포를 위해 동시성 제한
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies (Functions)
        run: |
          cd functions
          npm ci

      - name: Install dependencies (Client)
        run: |
          cd client
          npm ci

      - name: Build (Client)
        run: |
          cd client
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
          CI: true

      # Node.js 설정 (v20 LTS로 고정하여 GCF 런타임 일치)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. Firebase 인증 및 서비스 계정 권한 로드 (printf 방식으로 무결성 확보)
      - name: Authenticate with Firebase
        run: |
          mkdir -p .firebase
          printf "%s" "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HR_SPENDING }}" > .firebase/service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/.firebase/service-account.json" >> $GITHUB_ENV
          echo "GOOGLE_CLOUD_PROJECT=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV

      # 2. 인증 상태 사전 검증 (실패 시 즉시 중단하여 원인 파악)
      - name: Verify Firebase Auth Status
        run: |
          npx firebase-tools projects:list --non-interactive
          npx firebase-tools --version

      # 3. Firebase Cloud Functions 배포 (디버그 모드 활성화)
      - name: Deploy to Firebase (Functions Only)
        run: npx firebase-tools deploy --only functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive --debug

      # 4. Firebase Hosting 및 규칙 배포
      - name: Deploy to Firebase (Hosting & Rules)
        run: npx firebase-tools deploy --only hosting,firestore:rules,storage:rules --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive --debug

      # 클린업
      - name: Cleanup Auth File
        run: rm -f .firebase/service-account.json
        if: always()

      # GitHub Pages 배포 전 아티팩트 업로드
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

  # GitHub Pages 배포 작업
  deploy_pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
